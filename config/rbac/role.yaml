---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - metalk8s.scality.com
  resources:
  - discovereddisks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - metalk8s.scality.com
  resources:
  - discovereddisks/finalizers
  verbs:
  - update
- apiGroups:
  - metalk8s.scality.com
  resources:
  - discovereddisks/status
  verbs:
  - get
  - patch
  - update
