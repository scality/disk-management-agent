# This rule is not used by the project disk-management-agent itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to metalk8s.scality.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: disk-management-agent
    app.kubernetes.io/managed-by: kustomize
  name: discoveredphysicaldisk-viewer-role
rules:
- apiGroups:
  - metalk8s.scality.com
  resources:
  - discoveredphysicaldisks
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - metalk8s.scality.com
  resources:
  - discoveredphysicaldisks/status
  verbs:
  - get
