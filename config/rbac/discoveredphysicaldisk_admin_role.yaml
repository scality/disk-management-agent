# This rule is not used by the project disk-management-agent itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over metalk8s.scality.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: disk-management-agent
    app.kubernetes.io/managed-by: kustomize
  name: discoveredphysicaldisk-admin-role
rules:
- apiGroups:
  - metalk8s.scality.com
  resources:
  - discoveredphysicaldisks
  verbs:
  - '*'
- apiGroups:
  - metalk8s.scality.com
  resources:
  - discoveredphysicaldisks/status
  verbs:
  - get
