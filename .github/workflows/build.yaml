name: "Build"

on:
  workflow_call:
    inputs:
      is-development:
        description: "Whether the build is for development purposes or not"
        required: false
        default: true
        type: boolean
      is-latest:
        description: "Whether the build is for the latest tag or not"
        required: false
        default: false
        type: boolean
      is-stable:
        description: "Whether the build is for a stable release or not"
        required: false
        default: false
        type: boolean
    outputs:
      image-name:
        description: "The full image name with tag"
        value: ${{ jobs.build.outputs.image-name }}
      image-version:
        description: "The version of the image"
        value: ${{ jobs.build.outputs.image-version }}

jobs:
  build:
    outputs:
      image-name: ${{ steps.tags.outputs.tags }}
      image-version: ${{ steps.tags.outputs.version }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Login to the registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          version="$(git describe --tags --always --dirty --match='v[0-9]*')${{ inputs.is-development && '-dev' || '' }}"
          tags="ghcr.io/${{ github.repository }}:${version}"
          if [ "${{ inputs.is-latest }}" = "true" ]; then
            tags="$tags,ghcr.io/${{ github.repository }}:latest${{ ! inputs.is-stable && '-dev' || '' }}"
          fi
          echo "tags=$tags" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          build-args:
            APPLICATION_VERSION=${{ steps.tags.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=disk-management-agent
          cache-to: type=gha,mode=max,scope=disk-management-agent
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GIT_ACCESS_TOKEN }}

  upload-artifacts:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build manifest and CRDs
        run: |
          make build-installer IMG=$(echo "${{ needs.build.outputs.image-name }}" | cut -d',' -f1)
          make build-crds

      - name: Upload artifacts
        uses: scality/action-artifacts@v4
        with:
          url: https://artifacts.scality.net
          user: ${{ secrets.ARTIFACTS_USER }}
          password: ${{ secrets.ARTIFACTS_PASSWORD }}
          source: ./dist
          method: upload
