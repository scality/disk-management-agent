name: "Pre Merge"

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main

jobs:
  build:
    uses: ./.github/workflows/build.yaml
    secrets: inherit
    with:
      is-development: true
      is-latest: false
      is-stable: false

  go-generate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Ensure go generate has been run if needed
        run: |
          go generate ./... &&
          git diff --quiet

  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run linters
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.1.0

  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  test-e2e:
    uses: ./.github/workflows/test-e2e.yml
    secrets: inherit
